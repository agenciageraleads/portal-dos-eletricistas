name: E2E Smoke Tests (Produção)

on:
  schedule:
    - cron: '0 9 * * *' # Diariamente às 9h UTC (6h BRT)
  workflow_dispatch: # Permitir execução manual

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Instalar dependências
        run: npm ci
      
      - name: Instalar Playwright Browsers
        run: npx playwright install --with-deps chromium
      
      - name: Rodar Smoke Tests
        env:
          TEST_URL: https://app.portaleletricos.com.br
        run: |
          npx playwright test \
            tests/e2e/01-landing-page.spec.ts \
            tests/e2e/03-login.spec.ts \
            tests/e2e/04-catalogo.spec.ts \
            --project=chromium \
            --reporter=html,list
        continue-on-error: true
      
      - name: Upload Relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Upload Screenshots de Falhas
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures
          path: test-results/
          retention-days: 7

      - name: Notificar Falha (opcional)
        if: failure()
        run: |
          echo "⚠️ Testes E2E falharam em produção!"
          echo "Verifique os artefatos para mais detalhes."
